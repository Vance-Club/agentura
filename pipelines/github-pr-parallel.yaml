name: github-pr-parallel
description: "Parallel PR review — code review, testing, and docs generation run concurrently"
trigger:
  type: github_pr
  actions: [opened, synchronize]

phases:
  - name: analyze
    type: parallel
    steps:
      - skill: dev/pr-code-reviewer
        agent_id: reviewer
        required: true
      - skill: dev/pr-test-recommender
        agent_id: testing
        required: true
      - skill: dev/pr-doc-generator
        agent_id: docs
        required: false

  - name: report
    type: sequential
    fan_in_from: analyze
    steps:
      - skill: dev/pr-reporter
        agent_id: reporter
